# Local dev placeholder creds only — a Secret isn't real secrecy once
# committed to git. Use a proper secrets manager in production.
apiVersion: v1
kind: Secret
metadata:
  name: throttle-secrets
  namespace: throttle
type: Opaque
stringData:
  postgres-password: postgres
  database-url: "postgresql://postgres:postgres@postgres:5432/throttle?sslmode=disable"
  redis-url: "redis://redis:6379/0"
