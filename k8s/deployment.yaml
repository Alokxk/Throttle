apiVersion: apps/v1
kind: Deployment
metadata:
  name: throttle
  namespace: throttle
spec:
  replicas: 2
  selector:
    matchLabels:
      app: throttle
  template:
    metadata:
      labels:
        app: throttle
    spec:
      containers:
        - name: throttle
          image: throttle:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: throttle-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: throttle-secrets
                  key: redis-url
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
